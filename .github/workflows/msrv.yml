name: MSRV

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  msrv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features
